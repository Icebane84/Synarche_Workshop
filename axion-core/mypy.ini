[mypy]
python_version = 3.10
# Enforce strict type checking
strict = true
# Ignore missing imports
ignore_missing_imports = true
# Prevent mypy from traversing parent directories for package roots
explicit_package_bases = true
# Explicitly set the search path to src
mypy_path = src
# Exclude non-package directories
exclude = (_governance|\d+.*)