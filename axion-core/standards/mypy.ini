[mypy]
exclude = (?x)(archives/|\.archives/|assets/|docs/|vendor/)
# Global settings
python_version = 3.14
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True
ignore_missing_imports = True

# Project structure
mypy_path = src, ../open-notebook
explicit_package_bases = True
namespace_packages = True

# Output formatting
show_error_codes = True
show_column_numbers = True
pretty = True

# Cache configuration
cache_dir = .mypy_cache
sqlite_cache = True

[mypy-api.podcast_api_service]
ignore_errors = True

[mypy-api.auth]
ignore_errors = True

[mypy-api.routers.models]
ignore_errors = True

[mypy-open_notebook.domain.base]
ignore_errors = True

[mypy-open_notebook.domain.notebook]
ignore_errors = True

[mypy-open_notebook.graphs.transformation]
ignore_errors = True

[mypy-open_notebook.graphs.ask]
ignore_errors = True

