[tool.ruff]
# CODEX v10.0 Standard: 120 line length
line-length = 120
indent-width = 4

# Target Python 3.14+
target-version = "py314"

[tool.ruff.lint]
# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`)  codes by default.
# Unlike Flake8, Ruff doesn't enable pycodestyle warnings (`W`) or
# McCabe complexity (`C901`) by default.
# I = Isort (Imports sorting)
# N = Pep8 Naming
# UP = PyUpgrade (Modernize code)
# B = Bugbear (Potential bugs)
# C901 = McCabe Complexity (Warns on high complexity)
# SIM = Flake8-Simplify (Reduces redundant code like S5713)
# TRY = Tryceratops (Improves exception handling)
# PL = Pylint (Catches unreachable code S1763)
# RUF = Ruff-specific rules
# ARG = Flake8-Unused-Arguments (S1172)
select = ["E4", "E7", "E9", "F", "I", "N", "UP", "B", "C901", "SIM", "TRY", "PL", "RUF", "ARG", "ANN", "T20"]
ignore = ["TRY003", "PLR0913"] # Ignore overly strict message checks, arg count


# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.

[tool.pyrefly]
# Enforce Phoenix Law: Binary Truth in Typing
displayTypeErrors = "force-on"
source-directories = ["axion-core", "axion-core/src", "src"]
search-path = ["c:/Users/Chris/Synarche_Workspace/axion-core/src", "c:/Users/Chris/Synarche_Workspace/src"]
missing-import = false

[tool.mypy]
python_version = "3.14"
# Enforce strict type checking
strict = true
# Exclude non-package directories
exclude = [
    '^../_governance/.*',
    '^_governance/.*',
    '^\\d+.*'
]
