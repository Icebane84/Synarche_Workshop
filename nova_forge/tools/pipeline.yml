name: Production Build Pipeline

# 1. THE TRIGGER (The Start Button)
# "Run this robot every time code is pushed to the 'main' branch"
on:
  push:
    branches: [ "main" ]

jobs:
  # --- STAGE 1: CONTINUOUS INTEGRATION (Quality Control) ---
  check-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Trunk Check (Linting)
        uses: trunk-io/trunk-action@v1
        # If this fails (e.g., bad spelling), the pipeline stops HERE.

      - name: Run Unit Tests
        run: python -m pytest tests/

  # --- STAGE 2: CONTINUOUS DELIVERY (The Build) ---
  build-and-push:
    needs: check-quality  # Only run if Quality Control passed
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: myuser/fibonacci-app:${{ github.sha }} 
          # using the Commit Hash (SHA) ensures every version is unique

  # --- STAGE 3: CONTINUOUS DEPLOYMENT (The Shipping) ---
  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Update Kubernetes
        # We use a tool to tell the cluster: "Change image to version ${{ github.sha }}"
        run: |
          kubectl set image deployment/nginx-web-server nginx=myuser/fibonacci-app:${{ github.sha }}