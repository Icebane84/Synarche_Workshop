apiVersion: v1
kind: Service              # We are creating a Service resource
metadata:
  name: nginx-service      # The internal DNS name (e.g., http://nginx-service)
spec:
  type: LoadBalancer       # THE MAGIC: Asks your cloud provider for a Public IP
  selector:                # --- THE BRIDGE ---
    app: my-web-app        # Finds any Pod with this label (matches your Deployment)
  ports:
    - protocol: TCP
      port: 80             # The port the Public IP listens on (External)
      targetPort: 80       # The port the Pod is listening on (Internal)