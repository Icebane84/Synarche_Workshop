version: '3.8'
services:
  web-app:
    build: .                 # Build the image from the Dockerfile here
    ports:
      - "5000:5000"          # Map port 5000 (Host) to 5000 (Container)
    volumes:
      - .:/app               # <--- THE HOT RELOAD MAGIC (Bind Mount)
      - /app/node_modules    # (Optional) Prevent local node_modules from overwriting container's
    environment:
      - FLASK_ENV=development # Tells Python/Node to watch for file changes
    command: python app.py   # Overrides the CMD in Dockerfile if needed