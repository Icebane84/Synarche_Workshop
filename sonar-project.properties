# --- Project Identity ---
sonar.projectKey=Synarche.Protocol
sonar.projectName=The Synarche Protocol
sonar.projectVersion=11.3.0 (Monorepo)

# --- Scan Scope (The Weave) ---
# We explicitly include the active cores, agents, and the shared source spine.
sonar.sources=axion-core/src,axion-core/tools,nova-forge,open-notebook

# --- Exclusions (The Pruning) ---
# Remove noise, binaries, logs, and temporary playground data.
sonar.exclusions=**/node_modules/**, \
                 **/venv/**, \
                 **/.git/**, \
                 **/__pycache__/**, \
                 **/dist/**, \
                 **/.pytest_cache/**, \
                 **/_logs/**, \
                 **/_archive/**, \
                 **/Playground/**, \
                 **/Open Notebook/**, \
                 **/*.min.js, \
                 **/*.css

# --- Tests (The Verification) ---
sonar.tests=axion-core/tests
sonar.test.inclusions=**/tests/**, \
                      **/*_test.py, \
                      **/*.test.ts, \
                      **/*.spec.ts

# --- Language Specifics ---
sonar.sourceEncoding=UTF-8
sonar.python.version=3.10
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Quality Gate ---
# Enforce the "High-Standard" environment.
# sonar.qualitygate.wait=true
