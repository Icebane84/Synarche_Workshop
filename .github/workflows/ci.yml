name: Axion Core CI

# This workflow is triggered on pushes and pull requests to the main branch,
# but only when files inside the 'axion-core' directory are changed.
on:
    push:
        branches: [main]
        paths:
            - "axion-core/**"
            - ".github/workflows/ci.yml"
    pull_request:
        branches: [main]
        paths:
            - "axion-core/**"
            - ".github/workflows/ci.yml"

jobs:
    test:
        name: Run Axion Core Tests
        runs-on: ubuntu-latest

        steps:
            - name: 1. Checkout Repository
              uses: actions/checkout@v4

            - name: 2. Set up Node.js v20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: "axion-core/package-lock.json"

            - name: 3. Install Node.js Dependencies
              run: npm install
              working-directory: ./axion-core

            - name: 4. Set up Python v3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: 5. Install Python Dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install pytest
              working-directory: ./axion-core

            - name: 6. Run TypeScript/Mocha Integration Tests
              env:
                  PYTHON_PATH: python
              run: npm test
              working-directory: ./axion-core

            - name: 7. Run Python Unit Tests
              run: pytest
              working-directory: ./axion-core/src/cse

            - name: 8. Execute Phoenix Superposition Assembly Telemetry Verification
              run: npx ts-node -r tsconfig-paths/register ../scratch/test_superposition_assembly.ts
              working-directory: ./axion-core
